name: Tests

# Runs the integration test on every push and PR.
# Runs the visual regression test on push/PR with Playwright + pinned Chromium.
# Both run nightly so we catch drift in the live manifest or templates.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 8 * * *'  # daily at 08:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run integration test
        run: node tests/integration.test.js
        env:
          NO_COLOR: '1'

  visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Run visual regression test
        run: node tests/visual.test.js
        env:
          NO_COLOR: '1'
      - name: Upload visual report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: |
            tests/visual-report.html
            tests/current/
            tests/diffs/
          retention-days: 14
